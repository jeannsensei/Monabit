# ============================================================
# MonaBit — Backend Environment Variables (example)
# Copy this file to api-env.yaml and fill with real values
# ============================================================

# ---------- REQUIRED ----------

# Supabase project URL. Find it in Supabase Dashboard → Settings → API
SUPABASE_URL: "https://YOUR_PROJECT.supabase.co"

# Supabase anon/public key. Safe for client-side use (respects RLS).
# Find it in Supabase Dashboard → Settings → API → anon public
SUPABASE_ANON_KEY: "eyJ..."

# Supabase service_role key. SERVER ONLY — NEVER expose to frontend.
# Bypasses RLS for admin operations. Find in Supabase Dashboard → Settings → API → service_role
SUPABASE_SERVICE_ROLE_KEY: "eyJ..."

# PostgreSQL connection string for Drizzle ORM (direct DB connection).
# Format: postgresql://postgres:PASSWORD@db.PROJECT_REF.supabase.co:5432/postgres
# Find in Supabase Dashboard → Settings → Database → Connection string → URI
DATABASE_URL: "postgresql://postgres:YOUR_PASSWORD@db.YOUR_REF.supabase.co:5432/postgres"

# ---------- OPTIONAL (shown with defaults) ----------

# CoinGecko API key. Free tier: sign up at https://www.coingecko.com/en/api
# Without this key, API calls will fail (required since mid-2024)
COINGECKO_API_KEY: "CG-..."

# Frontend origin URL for CORS headers.
# In development: http://localhost:5173
# In production: https://monabit-web-XXXX-uc.a.run.app
# Requests from other origins will be rejected with CORS error
CORS_ORIGIN: "https://monabit-web-XXXX-uc.a.run.app"

# Environment: "production" | "development" | "test"
# Controls logging verbosity and other environment-specific behavior
NODE_ENV: "production"

# CoinGecko API base URL. Only change if using a different API provider
COINGECKO_API_URL: "https://api.coingecko.com/api/v3"

# Rate limit window in milliseconds. 900000ms = 15 minutes
RATE_LIMIT_WINDOW_MS: "900000"

# Maximum number of requests per IP within the rate limit window
RATE_LIMIT_MAX: "100"

# How long idempotency keys are stored (seconds). 86400s = 24 hours
# After this time, the same X-Idempotency-Key can be processed again
IDEMPOTENCY_TTL_SECONDS: "86400"

# Logging level: "trace" | "debug" | "info" | "warn" | "error" | "fatal"
# "info" is recommended for production. Use "debug" for development
LOG_LEVEL: "info"

# ⚠️ PORT is NOT included here — Cloud Run sets it automatically (default 8080)
