name: Deploy to Google Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build & push Backend
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/monabit/api:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/monabit/api:latest \
            ./api
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/monabit/api:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/monabit/api:latest

      - name: Build & push Frontend
        run: |
          docker build \
            --build-arg VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --build-arg VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --build-arg VITE_API_URL=${{ vars.API_URL }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/monabit/web:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/monabit/web:latest \
            ./web
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/monabit/web:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/monabit/web:latest

      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy monabit-api \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/monabit/api:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 1 \
            --set-env-vars "SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }},SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }},COINGECKO_API_KEY=${{ secrets.COINGECKO_API_KEY }},CORS_ORIGIN=${{ vars.WEB_URL }},NODE_ENV=production,LOG_LEVEL=info"

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy monabit-web \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/monabit/web:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2

      - name: Verify deployments
        run: |
          API_URL=$(gcloud run services describe monabit-api --region us-central1 --format 'value(status.url)')
          curl -f "$API_URL/api/health" || exit 1
          WEB_URL=$(gcloud run services describe monabit-web --region us-central1 --format 'value(status.url)')
          curl -f "$WEB_URL" || exit 1
          echo "Frontend: $WEB_URL"
          echo "Backend: $API_URL"
